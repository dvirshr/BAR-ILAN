/* Gather + render the dashboard */
async function renderDashScreen(){
  const el=document.getElementById('dash-screen');
  el.innerHTML='<div style="text-align:center;color:var(--tx3);padding:60px;font-size:14px">טוען נתונים...</div>';

  const [projects,members,profiles,messages]=await Promise.all([
    sbSelect('projects?select=id,name,data,updated_at&order=updated_at.desc'),
    sbSelect('project_members?select=project_id,user_id,permission'),
    sbSelect('profiles?select=id,full_name,email,role'),
    sbSelect('message_log?select=project_id,contractor,trade,sent_by,sent_at&order=sent_at.desc&limit=500')
  ]);

  const pmap={};profiles.forEach(p=>pmap[p.id]=p);
  const weekAgo=new Date(Date.now()-7*864e5).toISOString();

  const rows=projects.map(p=>{
    const d=p.data||{};
    const blds=d.buildings||[];
    // week = current only | all = past+current+next
    let tasks=0,done=0,workers=0;          // current week
    let allTasks=0,allDone=0;              // all weeks
    const contractors=new Set();           // registered
    const activeTrades=new Set();          // trades with OPEN tasks this week
    const projContractors=((blds[0]||{}).contractors||[]);
    projContractors.forEach(c=>{if(c&&c.name)contractors.add(c.name);});

    blds.forEach(b=>{
      const trades=[...(b.activeTrades||[]),...(b.customTrades||[])];
      const daily=b.daily||{};
      ['past','current','next'].forEach(wid=>{
        const wk=daily[wid];
        if(!wk)return;
        Object.keys(wk).forEach(di=>{
          const ds=wk[di];
          if(!ds||!ds.trades)return;
          Object.keys(ds.trades).forEach(ti=>{
            (ds.trades[ti]||[]).forEach(t=>{
              if(!t||!t.text||!t.text.trim())return;
              const isDone=Number(t.pct||0)>=100;
              allTasks++; if(isDone)allDone++;
              if(wid==='current'){
                tasks++;
                if(isDone)done++;
                workers+=Number(t.workers||0);
                if(!isDone){const tn=trades[ti];if(tn)activeTrades.add(tn);}
              }
            });
          });
        });
      });
    });

    // active contractors = those whose trades have OPEN tasks this week
    let activeContr=0;
    projContractors.forEach(c=>{
      if(!c||!c.name)return;
      const ctr=c.trades||[];
      if(ctr.some(t=>activeTrades.has(t)))activeContr++;
    });
    const msgs=messages.filter(m=>m.project_id===p.id);
    return {
      id:p.id,name:p.name||p.id,
      tasks,done,open:tasks-done,workers,
      allTasks,allDone,allOpen:allTasks-allDone,
      contractors:contractors.size,
      activeContr,
      msgsWeek:msgs.filter(m=>m.sent_at>=weekAgo).length,
      users:members.filter(m=>m.project_id===p.id).length,
      updated:p.updated_at,
      bldCount:blds.length
    };
  });

  // ── v25: משימות והזמנות לפי שבוע ──
  const _d0=new Date(); const _dow=_d0.getDay();
  const _sunNow=new Date(_d0); _sunNow.setDate(_d0.getDate()-_dow); _sunNow.setHours(0,0,0,0);
  const _satNow=new Date(_sunNow); _satNow.setDate(_sunNow.getDate()+6);
  const _sunNext=new Date(_sunNow); _sunNext.setDate(_sunNow.getDate()+7);
  const _satNext=new Date(_sunNext); _satNext.setDate(_sunNext.getDate()+6);
  const _iso=d=>d.toISOString().slice(0,10);
  const W_NOW=[_iso(_sunNow),_iso(_satNow)], W_NEXT=[_iso(_sunNext),_iso(_satNext)];
  const inRange=(s,e,r)=>{ if(!s&&!e)return false; const a=s||e,b=e||s; return a<=r[1]&&b>=r[0]; };

  let mspNow=0,mspNext=0,ordNow=0,ordNext=0,ordLate=0,ordWeek=0;
  projects.forEach(p=>{
    const mt=(p.data||{}).mspTasks||[];

<script id="msp-module">
/* ═══════════════════════════════════════════════════════════════
   YBNIR v22 · ייבוא לוח זמנים מ-MS Project (Excel)
   ─────────────────────────────────────────────────────────────
   • ייבוא אקסל: לו"ז בסיסי (baseline) + לו"ז עדכני + % ביצוע
   • 🔒 baseline ננעל בייבוא הראשון — לא נדרס בעדכונים
   • סנכרון לפי ID + אימות שם (התראה על אי-התאמה)
   • חלון תצוגה: החודש הקרוב + פיגורים
   ═══════════════════════════════════════════════════════════════ */

// ---------- מצב ----------
window.mspTasks = window.mspTasks || [];
let _mspStaged = null;   // תוצאת parse לפני אישור

// ---------- עזרי תאריך ----------
function mspDate(v) {
  if (!v) return null;
  if (v instanceof Date) return v.toISOString().slice(0, 10);
  const s0 = String(v).trim();
  if (!s0 || s0 === 'לא זמין' || s0 === 'NA' || s0 === 'N/A') return null;
  if (typeof v === 'number') { // Excel serial
    const d = new Date(Date.UTC(1899, 11, 30) + v * 86400000);
    return d.toISOString().slice(0, 10);
  }
  const s = s0;
  // ISO כבר תקין: 2026-06-15
  let m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if (m) return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
  // "09 אוקטובר 2024 08:00"
  const HE = {'ינואר':1,'פברואר':2,'מרץ':3,'אפריל':4,'מאי':5,'יוני':6,
              'יולי':7,'אוגוסט':8,'ספטמבר':9,'אוקטובר':10,'נובמבר':11,'דצמבר':12};
  m = s.match(/(\d{1,2})\s+([\u0590-\u05FF]+)\s+(\d{4})/);
  if (m && HE[m[2]]) return `${m[3]}-${String(HE[m[2]]).padStart(2,'0')}-${m[1].padStart(2,'0')}`;
  // DD/MM/YYYY או DD.MM.YY  (פורמט ישראלי — יום ראשון)
  m = s.match(/^(\d{1,2})[\/.\-](\d{1,2})[\/.\-](\d{2,4})/);
  if (m) {
    let dd = +m[1], mm = +m[2], y = m[3];
    if (y.length === 2) y = '20' + y;
    if (mm > 12 && dd <= 12) { const t = dd; dd = mm; mm = t; } // הגנה
    if (mm < 1 || mm > 12 || dd < 1 || dd > 31) return null;
    return `${y}-${String(mm).padStart(2,'0')}-${String(dd).padStart(2,'0')}`;
  }
  return null;
}
const mspToday = () => new Date().toISOString().slice(0, 10);
function mspDaysBetween(a, b) {
  if (!a || !b) return null;
  return Math.round((new Date(b) - new Date(a)) / 86400000);
}
function mspFmt(iso) {
  if (!iso) return '—';
  const [y, m, d] = iso.split('-');
  return `${d}/${m}/${y.slice(2)}`;
}

// ---------- זיהוי עמודות (פורמט קבוע לפי שמות) ----------
function mspDetectCols(rows) {
  for (let r = 0; r < Math.min(6, rows.length); r++) {
    const row = (rows[r] || []).map(c => String(c == null ? '' : c).trim());
    const find = (...names) => {
      for (let i = 0; i < row.length; i++)
        if (names.some(n => row[i] === n)) return i;
      return null;
    };
    const idx = {
      id:      find('מזהה_ייחודי', 'מזהה ייחודי', 'Unique ID', 'UID', 'ID'),
      name:    find('שם', 'שם המשימה', 'Name'),
      dur:     find('משך', 'Duration'),
      parent:  find('שם_פעילות_הערסל', 'שם פעילות הערסל', 'Summary Task Name'),
      level:   find('רמת_חלוקה', 'רמת חלוקה', 'Outline Level'),
      // baseline (מתוכנן)
      bStart:  find('התחלה', 'Start'),
      bEnd:    find('סיום', 'Finish'),
      // בפועל
      aStart:  find('התחלה_בפועל', 'התחלה בפועל', 'Actual Start'),
      aEnd:    find('סיום_בפועל', 'סיום בפועל', 'Actual Finish'),
      done:    find('אחוז_ביצוע', 'אחוז ביצוע', '% ביצוע', '% Complete', 'בוצע'),
      note:    find('הערות', 'Notes')
    };
    // חובה: שם + לפחות זוג תאריכים אחד
    if (idx.name != null && (idx.bStart != null || idx.aStart != null)) {
      idx.headerRow = r;
      return idx;
    }
  }
  return null;
}

// ---------- Parse ----------
function mspParseRows(rows) {
  const c = mspDetectCols(rows);
  if (!c) throw new Error('לא זוהו עמודות. ודא כותרות: מזהה_ייחודי, שם, התחלה, סיום, התחלה_בפועל, סיום_בפועל, אחוז_ביצוע.');
  const out = [], warn = [];
  for (let r = c.headerRow + 1; r < rows.length; r++) {
    const row = rows[r] || [];
    const name = c.name != null ? row[c.name] : null;
    if (!name || String(name).trim() === '') continue;
    // ID
    let id = c.id != null ? row[c.id] : null;
    id = id != null && String(id).trim() !== '' ? parseInt(id, 10) : null;
    if (id == null || isNaN(id)) { id = r; } // גיבוי: מספר שורה
    // אחוז ביצוע — עשרוני (0.3) או אחוז (30) או "V"
    let pct = 0, status = 'todo';
    if (c.done != null) {
      const raw = String(row[c.done] == null ? '' : row[c.done]).trim();
      if (/^v$/i.test(raw)) { pct = 100; }
      else if (raw && raw !== '-' && raw !== 'לא זמין') {
        let num = parseFloat(raw);
        if (!isNaN(num)) pct = num <= 1 ? Math.round(num * 100) : Math.round(num);
      }
      status = pct >= 100 ? 'done' : (pct > 0 ? 'in_progress' : 'todo');
    }
    out.push({
      id,
      name: String(name).trim(),
      dur: c.dur != null ? row[c.dur] : null,
      // baseline (מתוכנן) = עמודות התחלה/סיום
      bl_start: c.bStart != null ? mspDate(row[c.bStart]) : null,
      bl_end:   c.bEnd   != null ? mspDate(row[c.bEnd])   : null,
      // בפועל/עדכני = *_בפועל
      start: c.aStart != null ? mspDate(row[c.aStart]) : null,
      end:   c.aEnd   != null ? mspDate(row[c.aEnd])   : null,
      pct, status,
      parent: c.parent != null ? String(row[c.parent] || '').trim() : '',
      level:  c.level  != null ? (parseInt(row[c.level], 10) || 0) : 0,
      note: c.note != null ? (row[c.note] || '') : ''
    });
  }
  if (!out.length) throw new Error('לא נמצאו שורות משימה בגיליון.');
  return { tasks: out, cols: c, warn };
}

// ---------- מיזוג ----------
function mspMerge(incoming) {
  const cur = window.mspTasks || [];
  const byId = {}; cur.forEach(t => byId[t.id] = t);
  const res = { added: 0, updated: 0, mismatch: [], blLocked: 0, tasks: [] };
  const firstImport = cur.length === 0;

  incoming.forEach(n => {
    const ex = byId[n.id];
    if (!ex) {
      // חדשה — בייבוא ראשון גם נועלים baseline
      const t = Object.assign({}, n, {
        bl_start_locked: n.bl_start, bl_end_locked: n.bl_end,
        subtasks: [], chapter: null, entrance: null, loc: null
      });
      res.tasks.push(t); res.added++;
      if (t.bl_end_locked) res.blLocked++;
    } else {
      // אימות שם
      if (ex.name !== n.name) res.mismatch.push({ id: n.id, was: ex.name, now: n.name });
      // 🔒 baseline לא נדרס לעולם
      const t = Object.assign({}, ex, {
        name: n.name, dur: n.dur,
        start: n.start, end: n.end,
        status: n.status, note: n.note,
        pct: n.pct, parent: n.parent, level: n.level
      });
      // אם ה-baseline טרם ננעל (ייבוא ישן) — נעל עכשיו
      if (!t.bl_end_locked && n.bl_end) {
        t.bl_start_locked = n.bl_start; t.bl_end_locked = n.bl_end; res.blLocked++;
      }
      res.tasks.push(t); res.updated++;
    }
  });
  // משימות שהיו ואינן בקובץ החדש — נשמרות, מסומנות
  const inc = {}; incoming.forEach(n => inc[n.id] = 1);
  cur.forEach(t => { if (!inc[t.id]) { t._missing = true; res.tasks.push(t); } });
  res.firstImport = firstImport;
  return res;
}

// ---------- חלון תצוגה ----------
function mspWindow(tasks, monthsAhead) {
  const today = mspToday();
  const to = new Date(); to.setMonth(to.getMonth() + (monthsAhead || 2));
  const toISO = to.toISOString().slice(0, 10);
  return (tasks || []).filter(t => {
    if (t.status === 'done') return false;
    // תאריך אפקטיבי: בפועל אם קיים, אחרת מתוכנן
    const s = t.start || t.bl_start, e = t.end || t.bl_end;
    if (!s || !e) return false;
    if (e < today) return true;                    // פיגור
    return s <= toISO && e >= today;                // בחלון
  }).map(t => {
    const e = t.end || t.bl_end;
    return Object.assign({}, t, {
      _s: t.start || t.bl_start, _e: e,
      late_days: e < today ? mspDaysBetween(e, today) : 0,
      bl_dev: (t.bl_end_locked && e) ? mspDaysBetween(t.bl_end_locked, e) : null
    });
  }).sort((a, b) => (a._s || '').localeCompare(b._s || ''));
}

// ═══════════ ממשק ═══════════
function openMspImport() {
  const n = (window.mspTasks || []).length;
  const html = `
  <div class="modal-backdrop" id="msp-modal" onclick="if(event.target===this)closeMspImport()">
    <div class="modal" style="max-width:760px">
      <div class="modal-head">
        <h3 style="margin:0">📥 ייבוא לוח זמנים</h3>
        <button class="btn btn-sm" onclick="closeMspImport()">✕</button>
      </div>
      <div class="modal-body" id="msp-body">
        ${n ? `<div style="background:var(--bg2);padding:10px;border-radius:8px;margin-bottom:12px;font-size:13px">
                 📊 כרגע במערכת: <strong>${n}</strong> משימות.
                 ייבוא חדש <strong>יעדכן</strong> תאריכים ואחוזי ביצוע.
                 <span style="color:var(--gr)">🔒 ה-baseline לא ישתנה.</span>
               </div>`
             : `<div style="background:#FFF4E0;padding:10px;border-radius:8px;margin-bottom:12px;font-size:13px;color:#7a5a00">
                 🔒 <strong>ייבוא ראשון</strong> — הלו"ז הבסיסי (baseline) ייקבע וננעל לצמיתות.
                 ודא שזה הלו"ז החוזי הנכון.
               </div>`}
        <div id="msp-drop" style="border:2px dashed var(--bd);border-radius:12px;padding:34px;text-align:center;cursor:pointer;transition:.2s"
             onclick="document.getElementById('msp-file').click()"
             ondragover="event.preventDefault();this.style.borderColor='var(--brand-gold)'"
             ondragleave="this.style.borderColor='var(--bd)'"
             ondrop="event.preventDefault();this.style.borderColor='var(--bd)';mspHandleFile(event.dataTransfer.files[0])">
          <div style="font-size:34px">📊</div>
          <div style="margin-top:8px;font-weight:600">גרור קובץ Excel או לחץ לבחירה</div>
          <div style="font-size:12px;color:var(--tx3);margin-top:6px">
            עמודות: מספור · שם · משך · התחלה/סיום (עדכני) · התחלה/סיום (בסיסי) · בוצע
          </div>
        </div>
        <input type="file" id="msp-file" accept=".xlsx,.xls" style="display:none"
               onchange="mspHandleFile(this.files[0])">
      </div>
    </div>
  </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
}
function closeMspImport() { const m = document.getElementById('msp-modal'); if (m) m.remove(); }

async function mspHandleFile(file) {
  if (!file) return;
  const body = document.getElementById('msp-body');
  body.innerHTML = '<div style="text-align:center;padding:40px">⏳ קורא קובץ…</div>';
  try {
    if (typeof XLSX === 'undefined') await mspLoadXLSX();
    const buf = await file.arrayBuffer();
    const wbk = XLSX.read(buf, { type: 'array', cellDates: true });
    // בוחר את הגיליון עם הכי הרבה שורות שמכיל עמודות מזוהות
    let best = null;
    for (const sn of wbk.SheetNames) {
      const rows = XLSX.utils.sheet_to_json(wbk.Sheets[sn], { header: 1, raw: false, dateNF: 'yyyy-mm-dd' });
      try { const p = mspParseRows(rows);
            if (!best || p.tasks.length > best.tasks.length) { best = p; best.sheet = sn; }
      } catch (e) { /* גיליון לא מתאים */ }
    }
    if (!best) throw new Error('לא נמצא גיליון מתאים בקובץ.');
    _mspStaged = best;
    mspShowPreview(best, file.name);
  } catch (e) {
    body.innerHTML = `<div style="padding:20px;text-align:center">
      <div style="font-size:34px">⚠️</div>
      <div style="color:var(--rd);margin:10px 0;font-weight:600">${e.message}</div>
      <button class="btn" onclick="closeMspImport();openMspImport()">נסה שוב</button></div>`;
  }
}

function mspLoadXLSX() {
  return new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload = res; s.onerror = () => rej(new Error('טעינת ספריית Excel נכשלה'));
    document.head.appendChild(s);
  });
}

function mspShowPreview(parsed, fname) {
  const m = mspMerge(parsed.tasks);
  const win = mspWindow(m.tasks, 2);
  const stat = { done: 0, prog: 0, todo: 0 };
  parsed.tasks.forEach(t => stat[t.status === 'done' ? 'done' : t.status === 'in_progress' ? 'prog' : 'todo']++);

  const rows = win.slice(0, 60).map(t => {
    const dev = t.bl_dev != null
      ? `<span style="color:${t.bl_dev > 60 ? 'var(--rd)' : t.bl_dev > 0 ? 'var(--am)' : 'var(--gr)'};font-weight:600">${t.bl_dev > 0 ? '+' : ''}${t.bl_dev}י</span>`
      : '—';
    const late = t.late_days ? `<span style="color:var(--rd)">⚠️${t.late_days}י</span>` : '';
    return `<tr>
      <td style="padding:5px;color:var(--tx3)">#${t.id}</td>
      <td style="padding:5px;text-align:right">${t.name} ${late}</td>
      <td style="padding:5px;white-space:nowrap;font-size:11px">${mspFmt(t._s)}→${mspFmt(t._e)}</td>
      <td style="padding:5px;text-align:center;font-size:11px">${dev}</td></tr>`;
  }).join('');

  document.getElementById('msp-body').innerHTML = `
    <div style="font-size:12px;color:var(--tx3);margin-bottom:8px">📄 ${fname} · גיליון: ${parsed.sheet}</div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px">
      ${[['סה"כ', parsed.tasks.length, ''], ['חדשות', m.added, 'var(--gr)'],
         ['עודכנו', m.updated, 'var(--bl)'], ['הושלמו', stat.done, 'var(--tx3)']]
        .map(([l, v, c]) => `<div style="background:var(--bg2);padding:8px;border-radius:8px;text-align:center">
          <div style="font-size:19px;font-weight:700;${c ? 'color:' + c : ''}">${v}</div>
          <div style="font-size:10px;color:var(--tx3)">${l}</div></div>`).join('')}
    </div>
    ${m.blLocked ? `<div style="background:#E8F5E9;padding:8px;border-radius:8px;margin-bottom:10px;font-size:12px;color:#2E7D32">
        🔒 ננעל baseline עבור <strong>${m.blLocked}</strong> משימות — לא ישתנה בעדכונים הבאים.</div>` : ''}
    ${m.mismatch.length ? `<div style="background:#FFEBEE;padding:8px;border-radius:8px;margin-bottom:10px;font-size:12px;color:#C62828">
        🚨 <strong>${m.mismatch.length}</strong> אי-התאמות שם (ID קיים עם שם אחר) — ייתכן שהמבנה השתנה.
        <div style="font-size:11px;margin-top:4px">${m.mismatch.slice(0,3).map(x=>`#${x.id}: "${x.was}" → "${x.now}"`).join('<br>')}</div></div>` : ''}
    <div style="font-weight:600;margin:10px 0 6px">📅 חלון עבודה — חודשיים קדימה + פיגורים (${win.length})</div>
    <div style="max-height:290px;overflow:auto;border:1px solid var(--bd);border-radius:8px">
      <table style="width:100%;border-collapse:collapse;font-size:12px">
        <thead style="position:sticky;top:0;background:var(--bg2)"><tr>
          <th style="padding:6px">#</th><th style="padding:6px">משימה</th>
          <th style="padding:6px">תאריכים</th><th style="padding:6px">מול baseline</th></tr></thead>
        <tbody>${rows || '<tr><td colspan="4" style="padding:16px;text-align:center;color:var(--tx3)">אין משימות בחלון</td></tr>'}</tbody>
      </table>
    </div>
    ${win.length > 60 ? `<div style="font-size:11px;color:var(--tx3);margin-top:5px">מוצגות 60 ראשונות מתוך ${win.length}</div>` : ''}
    <div style="display:flex;gap:8px;margin-top:14px;justify-content:flex-end">
      <button class="btn" onclick="closeMspImport()">ביטול</button>
      <button class="btn" style="background:var(--brand-gold);color:#fff;border-color:var(--brand-gold);font-weight:600"
              onclick="mspConfirmImport()">✓ אשר וייבא</button>
    </div>`;
}

function mspConfirmImport() {
  if (!_mspStaged) return;
  const m = mspMerge(_mspStaged.tasks);
  window.mspTasks = m.tasks;
  _mspStaged = null;
  closeMspImport();
  if (typeof saveAll === 'function') saveAll();
  if (typeof scheduleCloudSave === 'function') scheduleCloudSave();
  if (typeof toast === 'function') toast(`✓ יובאו ${m.added + m.updated} משימות`);
  else alert(`✓ יובאו ${m.added + m.updated} משימות`);
  if (typeof renderAll === 'function') renderAll();
}

</script>
<script id="sched-module">
/* ═══════════════════════════════════════════════════════════════
   YBNIR v23b · מסך לוח זמנים — חלון עבודה
   ─────────────────────────────────────────────────────────────
   • מציג את mspTasks בחלון: החודש+פיגורים / הכל / לפי פילטר
   • baseline מול בפועל, סטייה, אחוז ביצוע
   • כפתור "פרק למשימות" (יחובר ל-v23c)
   ═══════════════════════════════════════════════════════════════ */



// ---------- בניית עץ ערסלים (2 רמות) ----------
// שימוש ב-level + סדר: לכל ערסל, מוצא את הערסל שמעליו ברמה
function schedBuildTree(all) {
  const map = {};        // שם ערסל -> {level, parent}
  const stack = {};      // level -> שם
  (all || []).forEach(t => {
    const lv = t.level || 0;
    // נקה רמות עמוקות יותר
    Object.keys(stack).forEach(k => { if (+k >= lv) delete stack[k]; });
    if (t.parent && !map[t.parent]) {
      // ההורה נמצא ברמה lv-1
      const pl = lv - 1;
      const gp = stack[pl - 1] || null;
      map[t.parent] = { level: pl, parent: gp };
    }
    stack[lv] = t.name;
  });
  return map;
}

// ---------- סינון: רק ביצוע פיזי ----------
const SCHED_SKIP_PARENT = [/אישור/, /מו"מ/, /בחיר/, /התקשרו/, /הסכמ/, /תכנון/, /הגשה/, /הזמנ/, /אספק/];
const SCHED_SKIP_SELF   = [/^אישור/, /אישורי/, /מו"מ/, /בחיר/, /קבלת /, /הגשה לאישור/, /הזמנ/, /^אספק/,
                            /^מדיד/, /מדידה/, /מדידת/, /^מידות/, /SHOP DRAWING/i, /פיקוח עירוני/, /טופס 4/,
                            /התקשרו/, /הסכמ/, /^תכנון/];
function schedIsSkip(t) {
  const nm = t.name || '', pa = t.parent || '';
  if (SCHED_SKIP_SELF.some(r => r.test(nm))) return true;
  if (pa && SCHED_SKIP_PARENT.some(r => r.test(pa))) return true;
  return false;
}
// ערסל = יש משימות שמצביעות עליו כהורה
let _schedParents = null;
function schedIsSummary(t, all) {
  if (!_schedParents) {
    _schedParents = {};
    (all || []).forEach(x => { if (x.parent) _schedParents[x.parent] = 1; });
  }
  return !!_schedParents[t.name];
}

let _schedOpen = {};   // אילו קבוצות פתוחות
let _schedFilter = 'window';   // window | all | late
let _schedMonths = 2;

function openSchedScreen() {
  const pnEl = document.getElementById('proj-name');
  const pn = pnEl ? (pnEl.value || '').trim() : '';
  if (!pn || document.body.classList.contains('on-dash')) {
    alert('יש לפתוח פרויקט כדי לראות את לוח הזמנים.');
    return;
  }
  if (!(window.mspTasks || []).length) {
    if (confirm('לא יובא לוח זמנים לפרויקט זה.\nלייבא עכשיו?')) openMspImport();
    return;
  }
  let scr = document.getElementById('sched-screen');
  if (!scr) {
    scr = document.createElement('div');
    scr.id = 'sched-screen';
    scr.style.cssText = 'display:none;padding:0;margin:0';
    document.body.appendChild(scr);
  }
  try { closeModal(); } catch (e) {}
  scr.style.display = 'block';
  const mc = document.getElementById('main-content'); if (mc) mc.style.display = 'none';
  const bar = document.querySelector('.bld-bar'); if (bar) bar.style.display = 'none';
  document.body.classList.add('on-sched');
  renderSchedScreen();
}

async function dashOpenOrders(){
  // אוסף הזמנות מכל הפרויקטים (בדשבורד אין פרויקט טעון)
  try{
    const projects=await sbSelect('projects?select=id,name,data');
    const all=[];
    (projects||[]).forEach(p=>{
      ((p.data||{}).mspTasks||[]).forEach(t=>{
        (t.orders||[]).forEach((o,i)=>all.push(Object.assign({},o,{
          _taskId:t.id,_taskName:t.name,_parent:t.parent,_idx:i,_proj:p.name
        })));
      });
    });
    if(!all.length){ alert('אין הזמנות רשומות באף פרויקט.'); return; }
    ordCenterFrom(all);
  }catch(e){ alert('שגיאה בטעינת הזמנות: '+e.message); }
}
function closeSchedScreen() {
  const scr = document.getElementById('sched-screen'); if (scr) scr.style.display = 'none';
  const mc = document.getElementById('main-content'); if (mc) mc.style.display = '';
  const bar = document.querySelector('.bld-bar'); if (bar) bar.style.display = '';
  document.body.classList.remove('on-sched');
}

// שיוך פרק+כניסה מהסימון (אם קיים ב-task), אחרת ריק
function schedChapter(t) { return t.chapter || null; }
function schedEntrance(t) { return t.entrance || null; }

function renderSchedScreen() {
  const scr = document.getElementById('sched-screen');
  const all = window.mspTasks || [];
  const today = mspToday();

  _schedParents = null;  // reset cache
  const exec = all.filter(t => !schedIsSkip(t) && !schedIsSummary(t, all));

  // חישוב חלון
  let list;
  if (_schedFilter === 'all') {
    list = exec.slice();
  } else if (_schedFilter === 'late') {
    list = exec.filter(t => {
      const e = t.end || t.bl_end;
      return t.status !== 'done' && e && e < today;
    });
  } else {
    list = mspWindow(exec, _schedMonths);
  }

  // העשרה + מיון
  list = list.map(t => {
    const s = t.start || t.bl_start, e = t.end || t.bl_end;
    return Object.assign({}, t, {
      _s: s, _e: e,
      _late: (t.status !== 'done' && e && e < today) ? mspDaysBetween(e, today) : 0,
      _dev: (t.bl_end_locked && e) ? mspDaysBetween(t.bl_end_locked, e) : null,
      _subs: (t.subtasks || []).length
    });
  }).sort((a, b) => (a._s || '').localeCompare(b._s || ''));

  // ספירות
  const cW = mspWindow(exec, _schedMonths).length;
  const cLate = exec.filter(t => { const e = t.end || t.bl_end; return t.status !== 'done' && e && e < today; }).length;
  const cAll = exec.length;

  const chip = (id, label, n, active) =>
    `<button onclick="schedSetFilter('${id}')" style="padding:6px 14px;border-radius:20px;border:1px solid var(--bd);cursor:pointer;font-size:13px;font-weight:${active ? 600 : 400};background:${active ? 'var(--brand-gold)' : 'var(--bg2)'};color:${active ? '#fff' : 'var(--tx)'}">${label} ${n != null ? `<span style="opacity:.7">${n}</span>` : ''}</button>`;

  // ── קיבוץ 2 רמות: ערסל-על → ערסל → משימות ──
  const tree = schedBuildTree(all);
  const byParent = {};
  list.forEach(t => { const k = t.parent || '— ללא מיקום'; (byParent[k] = byParent[k] || []).push(t); });

  // קבץ ערסלים תחת ערסל-העל שלהם
  const top = {};
  Object.keys(byParent).forEach(k => {
    const info = tree[k];
    let gp = info && info.parent ? info.parent : null;
    // דלג על רמת המבנה העליונה (level<=1)
    if (gp && tree[gp] && tree[gp].level <= 1) gp = null;
    const key = gp || '·';   // '·' = ללא ערסל-על
    (top[key] = top[key] || {})[k] = byParent[k];
  });

  const cntOf = o => Object.values(o).reduce((s, a) => s + a.length, 0);
  const topKeys = Object.keys(top).sort((a, b) => {
    const fa = Object.values(top[a]).flat().map(x=>x._s).filter(Boolean).sort()[0] || '';
    const fb = Object.values(top[b]).flat().map(x=>x._s).filter(Boolean).sort()[0] || '';
    return fa.localeCompare(fb);
  });
  if (!Object.keys(_schedOpen).length && topKeys.length) _schedOpen[topKeys[0]] = true;

  const subBlock = (k, arr) => {
    const open = !!_schedOpen['s:' + k];
    const nLate = arr.filter(x => x._late).length;
    const nProg = arr.filter(x => x.status === 'in_progress').length;
    return `
    <div style="border-top:1px solid var(--bd)">
      <div onclick="schedToggle('s:${k.replace(/'/g, "\\'")}')"
           style="display:flex;align-items:center;gap:8px;padding:9px 14px 9px 28px;cursor:pointer;user-select:none">
        <span style="font-size:11px;display:inline-block;transform:rotate(${open?'90':'0'}deg)">▶</span>
        <span style="font-weight:600;font-size:14px">${k}</span>
        <span style="background:var(--bg2);padding:1px 8px;border-radius:10px;font-size:11px">${arr.length}</span>
        ${nProg ? `<span style="color:var(--bl);font-size:11px">● ${nProg} בביצוע</span>` : ''}
        ${nLate ? `<span style="color:var(--rd);font-size:11px">⚠️ ${nLate}</span>` : ''}
      </div>
      <div style="display:${open?'flex':'none'};flex-direction:column;gap:8px;padding:${open?'4px 14px 12px':'0'}">
        ${arr.map(t => schedCard(t)).join('')}
      </div>
    </div>`;
  };

  const cards = topKeys.length ? topKeys.map(tk => {
    const subs = top[tk], open = !!_schedOpen[tk], n = cntOf(subs);
    const flat = Object.values(subs).flat();
    const nLate = flat.filter(x => x._late).length;
    const nProg = flat.filter(x => x.status === 'in_progress').length;
    const subKeys = Object.keys(subs).sort((a,b)=>{
      const fa=subs[a].map(x=>x._s).filter(Boolean).sort()[0]||'';
      const fb=subs[b].map(x=>x._s).filter(Boolean).sort()[0]||'';
      return fa.localeCompare(fb);
    });
    // אם אין ערסל-על — הצג את הערסלים ישירות
    if (tk === '·') return subKeys.map(k => `
      <div style="border:1px solid var(--bd);border-radius:12px;overflow:hidden;background:var(--sf)">
        ${subBlock(k, subs[k]).replace('border-top:1px solid var(--bd)','')}
      </div>`).join('');
    return `
    <div style="border:1px solid var(--bd);border-radius:12px;overflow:hidden;background:var(--sf)">
      <div onclick="schedToggle('${tk.replace(/'/g, "\\'")}')"
           style="display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;background:var(--bg2);user-select:none">
        <span style="font-size:13px;display:inline-block;transform:rotate(${open?'90':'0'}deg)">▶</span>
        <span style="font-weight:700;font-size:15px;color:var(--brand-gold)">📍 ${tk}</span>
        <span style="background:var(--sf);padding:1px 9px;border-radius:10px;font-size:12px">${n}</span>
        ${nProg ? `<span style="background:rgba(80,140,220,.18);color:var(--bl);padding:1px 8px;border-radius:10px;font-size:11px">${nProg} בביצוע</span>` : ''}
        ${nLate ? `<span style="background:rgba(200,60,60,.18);color:var(--rd);padding:1px 8px;border-radius:10px;font-size:11px">⚠️ ${nLate}</span>` : ''}
      </div>
      <div style="display:${open?'block':'none'}">
        ${subKeys.map(k => subBlock(k, subs[k])).join('')}
      </div>
    </div>`;
  }).join('') :
    `<div style="text-align:center;color:var(--tx3);padding:50px">אין משימות בתצוגה זו</div>`;

  scr.innerHTML = `
  <div style="max-width:1000px;margin:0 auto;padding:16px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px">
      <div>
        <h2 style="margin:0;font-size:20px">📅 לוח זמנים</h2>
        <div style="font-size:12px;color:var(--tx3);margin-top:2px">${exec.length} משימות ביצוע · מתוך ${all.length} בלו"ז · baseline נעול 🔒</div>
      </div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-sm" onclick="ordCenter()">📦 הזמנות</button>
        <button class="btn" onclick="closeSchedScreen()">✕ סגור</button>
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center">
      ${chip('window', '📆 חלון עבודה', cW, _schedFilter === 'window')}
      ${chip('late', '⚠️ בפיגור', cLate, _schedFilter === 'late')}
      ${chip('all', '📋 הכל', cAll, _schedFilter === 'all')}
      ${_schedFilter === 'window' ? `
        <span style="margin-inline-start:auto;font-size:12px;color:var(--tx3)">חודשים קדימה:</span>
        <select onchange="schedSetMonths(this.value)" style="padding:4px 8px;border-radius:6px;border:1px solid var(--bd);background:var(--bg2);color:var(--tx)">
          ${[1,2,3].map(m => `<option value="${m}" style="background:var(--sf);color:var(--tx)" ${m == _schedMonths ? 'selected' : ''}>${m}</option>`).join('')}
        </select>` : ''}
    </div>
    ${(typeof ordAtRisk==='function' && ordAtRisk().length) ? `
    <div onclick="ordCenter()" style="background:rgba(230,126,34,.15);border:1px solid #E67E22;border-radius:10px;padding:10px 14px;margin-bottom:12px;cursor:pointer;display:flex;align-items:center;gap:10px">
      <span style="font-size:20px">⏰</span>
      <div style="flex:1">
        <div style="font-weight:700;color:#E67E22">${ordAtRisk().length} הזמנות דורשות טיפול</div>
        <div style="font-size:12px;color:var(--tx3)">לחץ לצפייה בריכוז ההזמנות</div>
      </div>
      <span style="font-size:18px">←</span>
    </div>` : ''}
    <div style="display:flex;gap:6px;margin-bottom:8px">
      <button class="btn btn-sm" onclick="schedExpandAll(1)">⊞ פתח הכל</button>
      <button class="btn btn-sm" onclick="schedExpandAll(0)">⊟ סגור הכל</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px">${cards}</div>
  </div>`;
}

function schedCard(t) {
  const dev = t._dev != null
    ? `<span style="color:${t._dev > 60 ? 'var(--rd)' : t._dev > 0 ? 'var(--am)' : 'var(--gr)'};font-weight:600;font-size:12px">🔒 baseline ${mspFmt(t.bl_end_locked)} · ${t._dev > 0 ? '+' : ''}${t._dev}י</span>`
    : '';
  const late = t._late ? `<span style="background:var(--rd);color:#fff;padding:1px 8px;border-radius:10px;font-size:11px">⚠️ ${t._late} ימי פיגור</span>` : '';
  const stColor = t.status === 'done' ? 'var(--gr)' : t.status === 'in_progress' ? 'var(--bl)' : 'var(--tx3)';
  const stLabel = t.status === 'done' ? 'הושלם' : t.status === 'in_progress' ? `בביצוע ${t.pct}%` : 'טרם החל';
  const ch = schedChapter(t), en = schedEntrance(t);
  const tags = [
    ch ? `<span style="background:rgba(200,150,60,.15);color:var(--brand-gold);padding:1px 8px;border-radius:4px;font-size:11px;border:1px solid rgba(200,150,60,.3)">פרק ${ch}</span>` : '',
    en ? `<span style="background:var(--bg2);padding:1px 8px;border-radius:4px;font-size:11px">${en}</span>` : ''
  ].filter(Boolean).join(' ');

  return `
  <div style="background:var(--bg2);border:1px solid var(--bd);border-radius:12px;padding:14px;border-inline-start:4px solid ${stColor}">
    <div style="display:flex;justify-content:space-between;align-items:start;gap:10px">
      <div style="flex:1;min-width:0">
        <div style="font-weight:600;font-size:15px;margin-bottom:2px">${t.name}</div>

        <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:6px">${tags} ${late}</div>
        <div style="font-size:12px;color:var(--tx3)">
          📅 ${mspFmt(t._s)} → ${mspFmt(t._e)}
          <span style="color:${stColor};font-weight:600;margin-inline-start:8px">● ${stLabel}</span>
        </div>
        ${dev ? `<div style="margin-top:4px">${dev}</div>` : ''}
      </div>
      <div style="text-align:center">
        <button class="btn btn-sm" onclick="schedBreakdown('${t.id}')" style="white-space:nowrap">
          ${t._subs ? `📋 ${t._subs} משימות` : '➕ פרק'}
        </button>
      </div>
    </div>
  </div>`;
}

function schedToggle(k){ _schedOpen[k]=!_schedOpen[k]; renderSchedScreen(); }
function schedExpandAll(v){
  const all=window.mspTasks||[];
  _schedOpen={};
  if(v){ all.forEach(t=>{ if(t.parent){ _schedOpen[t.parent]=true; _schedOpen['s:'+t.parent]=true; } });
         const tr=schedBuildTree(all); Object.keys(tr).forEach(k=>{ if(tr[k].parent) _schedOpen[tr[k].parent]=true; });
         _schedOpen['— ללא מיקום']=true; _schedOpen['s:— ללא מיקום']=true; }
  else { _schedOpen={_none:1}; }
  renderSchedScreen();
}
function schedSetFilter(f) { _schedFilter = f; renderSchedScreen(); }
function schedSetMonths(m) { _schedMonths = parseInt(m, 10); renderSchedScreen(); }

// placeholder — יחובר ב-v23c (מסך פירוק)
function schedBreakdown(id) {
  alert('מסך פירוק המשימה — ייבנה בשלב הבא (v23c).\nמשימה #' + id);
}

</script>
<script id="bd-module">
/* ═══════════════════════════════════════════════════════════════
   YBNIR v24a · מסך פירוק משימה
   ─────────────────────────────────────────────────────────────
   • משימת-אב מהלו"ז → משימות-בת שמנה"ע יוצר
   • תבניות מוצעות (ניתנות לעריכה/מחיקה מלאה)
   • כל בת: אזור · קבלן/פרק · כ"א · תאריכים · הערות
   ═══════════════════════════════════════════════════════════════ */

// ---------- תבניות פירוק ----------
const BD_TEMPLATES = {
  'תקרה': [
    { name: 'טפסנות',            ch: '02', days: 5, w: 4 },
    { name: 'ברזל',              ch: '02', days: 6, w: 4 },
    { name: 'הכנות חשמל',        ch: '08', days: 3, w: 2 },
    { name: 'הכנות אינסטלציה',   ch: '07', days: 3, w: 2 },
    { name: 'יציקה',             ch: '02', days: 1, w: 8 }
  ],
  'עמודים': [
    { name: 'ברזל עמודים',  ch: '02', days: 3, w: 3 },
    { name: 'טפסנות',       ch: '02', days: 3, w: 4 },
    { name: 'יציקה',        ch: '02', days: 1, w: 5 }
  ],
  'קירות': [
    { name: 'ברזל',    ch: '02', days: 4, w: 3 },
    { name: 'טפסנות',  ch: '02', days: 4, w: 4 },
    { name: 'יציקה',   ch: '02', days: 1, w: 6 }
  ],
  'רצפה': [
    { name: 'בטון רזה',        ch: '02', days: 2, w: 3 },
    { name: 'איטום',           ch: '05', days: 3, w: 2 },
    { name: 'ברזל',            ch: '02', days: 6, w: 4 },
    { name: 'הכנות מערכות',    ch: '07', days: 3, w: 2 },
    { name: 'יציקה',           ch: '02', days: 1, w: 8 }
  ],
  'גמר': [
    { name: 'טיח',     ch: '09', days: 6, w: 4 },
    { name: 'ריצוף',   ch: '10', days: 6, w: 4 },
    { name: 'צבע',     ch: '11', days: 4, w: 3 },
    { name: 'אביזרים', ch: '08', days: 3, w: 2 }
  ]
};

function bdSuggestTemplate(name) {
  const n = name || '';
  if (/תקרה|רצפה כפולה/.test(n)) return 'תקרה';
  if (/עמוד/.test(n)) return 'עמודים';
  if (/קיר|גרעין|אלמנטים אנכ/.test(n)) return 'קירות';
  if (/רפסוד|רצפ/.test(n)) return 'רצפה';
  if (/גמר|טיח|ריצוף|צבע/.test(n)) return 'גמר';
  return null;
}

// ---------- עזרי תאריך (ימי עבודה) ----------
function bdAddWorkDays(iso, n) {
  if (!iso) return null;
  const d = new Date(iso + 'T00:00:00');
  let added = 0;
  while (added < n) {
    d.setDate(d.getDate() + 1);
    const dow = d.getDay();
    if (dow !== 5 && dow !== 6) added++;   // דילוג שישי-שבת
  }
  return d.toISOString().slice(0, 10);
}

// ---------- מציאת משימה ----------
function bdFind(id) {
  return (window.mspTasks || []).find(t => String(t.id) === String(id));
}

// ---------- מסך ראשי ----------
function schedBreakdown(id) {
  const t = bdFind(id);
  if (!t) { alert('משימה לא נמצאה'); return; }
  t.subtasks = t.subtasks || [];
  bdRender(id);
}

function bdRender(id) {
  const t = bdFind(id);
  const subs = t.subtasks || [];
  const totalMd = subs.reduce((s, x) => s + (+x.workers || 0) * (+x.days || 0), 0);
  const trades = [...new Set(subs.map(x => x.contractor).filter(Boolean))];
  const tmpl = bdSuggestTemplate(t.name);

  const rows = subs.length ? subs.map((s, i) => `
    <tr style="border-bottom:1px solid var(--bd)">
      <td style="padding:6px 4px">
        <input value="${(s.name||'').replace(/"/g,'&quot;')}" onchange="bdSet('${id}',${i},'name',this.value)"
               style="width:100%;background:transparent;border:none;color:var(--tx);font-size:13px;font-weight:600">
      </td>
      <td style="padding:6px 4px">
        <input value="${s.zone||''}" placeholder="אזור" onchange="bdSet('${id}',${i},'zone',this.value)"
               style="width:70px;background:var(--bg2);border:1px solid var(--bd);border-radius:4px;color:var(--tx);font-size:12px;padding:2px 5px">
      </td>
      <td style="padding:6px 4px">
        <input value="${s.contractor||''}" placeholder="קבלן" onchange="bdSet('${id}',${i},'contractor',this.value)"
               style="width:88px;background:var(--bg2);border:1px solid var(--bd);border-radius:4px;color:var(--tx);font-size:12px;padding:2px 5px">
      </td>
      <td style="padding:6px 4px;text-align:center">
        <input type="number" min="0" value="${s.workers||0}" onchange="bdSet('${id}',${i},'workers',this.value)"
               style="width:46px;background:var(--bg2);border:1px solid var(--bd);border-radius:4px;color:var(--tx);font-size:12px;padding:2px;text-align:center">
      </td>
      <td style="padding:6px 4px;text-align:center">
        <input type="number" min="0" step="0.5" value="${s.days||0}" onchange="bdSet('${id}',${i},'days',this.value)"
               style="width:46px;background:var(--bg2);border:1px solid var(--bd);border-radius:4px;color:var(--tx);font-size:12px;padding:2px;text-align:center">
      </td>
      <td style="padding:6px 4px;font-size:11px;color:var(--tx3);white-space:nowrap">
        ${s.start ? mspFmt(s.start) : '—'}${s.end ? ' → ' + mspFmt(s.end) : ''}
      </td>
      <td style="padding:6px 4px">
        <input value="${(s.note||'').replace(/"/g,'&quot;')}" placeholder="הערות" onchange="bdSet('${id}',${i},'note',this.value)"
               style="width:100%;min-width:90px;background:transparent;border:none;color:var(--tx3);font-size:12px">
      </td>
      <td style="padding:6px 2px;text-align:center">
        <button onclick="bdDel('${id}',${i})" style="background:none;border:none;color:var(--rd);cursor:pointer;font-size:15px">🗑</button>
      </td>
    </tr>`).join('') :
    `<tr><td colspan="8" style="padding:26px;text-align:center;color:var(--tx3)">
       אין משימות-בת. ${tmpl ? `הצע תבנית <strong>"${tmpl}"</strong> או ` : ''}הוסף ידנית.
     </td></tr>`;

  document.getElementById('modal-root').innerHTML = `
  <div class="modal-overlay" onclick="if(this===event.target)closeModal()">
    <div class="modal" style="max-width:940px;max-height:92vh;overflow-y:auto">
      <div style="border-bottom:1px solid var(--bd);padding-bottom:10px;margin-bottom:12px">
        <div style="font-size:17px;font-weight:700">${t.name}</div>
        <div style="font-size:12px;color:var(--brand-gold);margin-top:2px">📍 ${t.parent || '—'}</div>
        <div style="font-size:12px;color:var(--tx3);margin-top:4px">
          📅 ${mspFmt(t.start || t.bl_start)} → ${mspFmt(t.end || t.bl_end)}
          ${t.bl_end_locked ? ` · 🔒 baseline ${mspFmt(t.bl_end_locked)}` : ''}
          ${t.pct ? ` · ${t.pct}%` : ''}
        </div>
      </div>

      <div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap">
        <button class="btn btn-sm" onclick="bdAdd('${id}')">➕ הוסף משימה</button>
        ${tmpl ? `<button class="btn btn-sm" onclick="bdApplyTemplate('${id}','${tmpl}')"
                    style="background:var(--brand-gold);color:#fff;border-color:var(--brand-gold)">📋 הצע פירוק "${tmpl}"</button>` : ''}
        <select onchange="if(this.value)bdApplyTemplate('${id}',this.value);this.value=''"
                style="padding:4px 8px;border-radius:6px;border:1px solid var(--bd);background:var(--bg2);color:var(--tx);font-size:13px">
          <option value="">תבנית אחרת…</option>
          ${Object.keys(BD_TEMPLATES).map(k => `<option value="${k}" style="background:var(--sf);color:var(--tx)">${k}</option>`).join('')}
        </select>
      </div>

      <div style="overflow-x:auto;border:1px solid var(--bd);border-radius:8px">
        <table style="width:100%;border-collapse:collapse;font-size:13px">
          <thead style="background:var(--bg2)">
            <tr>
              <th style="padding:7px 4px;text-align:right;font-size:12px">משימה</th>
              <th style="padding:7px 4px;font-size:12px">אזור</th>
              <th style="padding:7px 4px;font-size:12px">קבלן</th>
              <th style="padding:7px 4px;font-size:12px">כ״א</th>
              <th style="padding:7px 4px;font-size:12px">ימים</th>
              <th style="padding:7px 4px;font-size:12px">תאריכים</th>
              <th style="padding:7px 4px;text-align:right;font-size:12px">הערות</th>
              <th style="padding:7px 2px"></th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>

      ${subs.length ? `
      <div style="display:flex;gap:14px;margin-top:10px;padding:9px 12px;background:var(--bg2);border-radius:8px;font-size:13px;flex-wrap:wrap">
        <span><strong>${subs.length}</strong> משימות</span>
        <span>Σ <strong>${totalMd}</strong> ימי-עבודה</span>
        ${trades.length ? `<span><strong>${trades.length}</strong> קבלנים</span>` : ''}
      </div>` : ''}

      <div style="display:flex;gap:8px;margin-top:14px;justify-content:flex-end">
        <button class="btn" onclick="ordRender('${id}')">📦 הזמנות${(t.orders||[]).length ? ' ('+t.orders.length+')' : ''}</button>
        <button class="btn" onclick="closeModal()">סגור</button>
        <button class="btn" style="background:var(--brand-gold);color:#fff;border-color:var(--brand-gold);font-weight:600"
                onclick="bdSave('${id}')">💾 שמור</button>
      </div>
    </div>
  </div>`;
}

// ---------- פעולות ----------
function bdAdd(id) {
  const t = bdFind(id);
  t.subtasks = t.subtasks || [];
  const last = t.subtasks[t.subtasks.length - 1];
  const start = last && last.end ? last.end : (t.start || t.bl_start);
  t.subtasks.push({ name: '', zone: '', contractor: '', workers: 0, days: 1,
                    start, end: bdAddWorkDays(start, 1), note: '' });
  bdRender(id);
}

function bdApplyTemplate(id, key) {
  const t = bdFind(id), tpl = BD_TEMPLATES[key];
  if (!tpl) return;
  if ((t.subtasks || []).length && !confirm('להחליף את הפירוק הקיים בתבנית "' + key + '"?')) return;
  let cur = t.start || t.bl_start;
  t.subtasks = tpl.map(x => {
    const s = cur, e = bdAddWorkDays(s, x.days);
    cur = e;
    return { name: x.name, zone: '', contractor: '', chapter: x.ch,
             workers: x.w, days: x.days, start: s, end: e, note: '' };
  });
  bdRender(id);
}

function bdSet(id, i, field, val) {
  const t = bdFind(id), s = t.subtasks[i];
  if (!s) return;
  s[field] = (field === 'workers' || field === 'days') ? (+val || 0) : val;
  if (field === 'days' && s.start) s.end = bdAddWorkDays(s.start, +val || 0);
  if (field === 'workers' || field === 'days') bdRender(id);
}

function bdDel(id, i) {
  const t = bdFind(id);
  t.subtasks.splice(i, 1);
  bdRender(id);
}

function bdSave(id) {
  const t = bdFind(id);
  t.subtasks = (t.subtasks || []).filter(s => (s.name || '').trim());
  if (typeof saveAll === 'function') saveAll();
  if (typeof scheduleCloudSave === 'function') scheduleCloudSave();
  closeModal();
  if (typeof renderSchedScreen === 'function') renderSchedScreen();
  if (typeof toast === 'function') toast('✓ נשמר');
}

</script>
<script id="ord-module">
/* ═══════════════════════════════════════════════════════════════
   YBNIR v24b · הזמנות חומרים
   ─────────────────────────────────────────────────────────────
   • חישוב אחורה: תאריך ביצוע − זמן אספקה − ביטחון = דדליין הזמנה
   • התראות לפי דחיפות (לא כפוף לחלון העבודה!)
   • מרוכז תחת "ארגון אתר" + מוצג בתוך המשימה
   ═══════════════════════════════════════════════════════════════ */

// ---------- זמני אספקה (ימי עבודה) ----------
const ORD_LEAD = {
  'ברזל':            10,
  'בטון':             3,
  'בטון — יציקה מיוחדת': 30,
  'אלומיניום':       22,
  'דלתות':           22,
  'מעליות':           0,   // פתוח — מנה"ע ממלא
  'גבס':              7,
  'ריצוף/חיפוי':     15,
  'מסגרות':          20,
  'אחר':              0
};
const ORD_SAFETY = 3;   // ימי ביטחון

// זיהוי סוג חומר + האם יציקה מיוחדת
function ordGuessMaterial(taskName, parentName) {
  const n = (taskName || '') + ' ' + (parentName || '');
  if (/רפסוד/.test(n)) return 'בטון — יציקה מיוחדת';
  if (/תקרה/.test(n) && /מרתף|חניון|מפלס -/.test(n)) return 'בטון — יציקה מיוחדת';
  if (/יציק|בטון|תקרה|עמוד|קיר|גרעין/.test(n)) return 'בטון';
  if (/ברזל|זיון/.test(n)) return 'ברזל';
  if (/אלומיניום|חלונות|ויטרינ/.test(n)) return 'אלומיניום';
  if (/דלת/.test(n)) return 'דלתות';
  if (/מעלי/.test(n)) return 'מעליות';
  if (/גבס|מחיצ/.test(n)) return 'גבס';
  if (/ריצוף|חיפוי/.test(n)) return 'ריצוף/חיפוי';
  if (/מסגר|מעקה/.test(n)) return 'מסגרות';
  return 'אחר';
}

// חישוב אחורה בימי עבודה
function ordSubWorkDays(iso, n) {
  if (!iso) return null;
  const d = new Date(iso + 'T00:00:00');
  let done = 0;
  while (done < n) {
    d.setDate(d.getDate() - 1);
    const dow = d.getDay();
    if (dow !== 5 && dow !== 6) done++;
  }
  return d.toISOString().slice(0, 10);
}

function ordDeadline(needDate, leadDays) {
  if (!needDate) return null;
  return ordSubWorkDays(needDate, (+leadDays || 0) + ORD_SAFETY);
}

// דחיפות
function ordUrgency(o) {
  if (o.status === 'סופק') return { k: 'done', c: 'var(--gr)', t: '✓ סופק' };
  if (!o.deadline) return { k: 'none', c: 'var(--tx3)', t: '—' };
  const today = mspToday();
  const dl = o.deadline;
  const days = mspDaysBetween(today, dl);
  if (o.status === 'הוזמן') return { k: 'ordered', c: 'var(--bl)', t: '📦 הוזמן' };
  if (days < 0)  return { k: 'late',  c: 'var(--rd)', t: `🔴 באיחור ${-days}י` };
  if (days <= 7) return { k: 'week',  c: '#E67E22',   t: `🟠 תוך ${days}י` };
  if (days <= 30) return { k: 'month', c: 'var(--am)', t: `🟡 ${days}י` };
  return { k: 'ok', c: 'var(--gr)', t: `🟢 ${days}י` };
}

// כל ההזמנות מכל המשימות
function ordAll() {
  const out = [];
  (window.mspTasks || []).forEach(t => {
    (t.orders || []).forEach((o, i) => out.push(Object.assign({}, o, {
      _taskId: t.id, _taskName: t.name, _parent: t.parent, _idx: i
    })));
  });
  return out;
}

function ordAtRisk() {
  return ordAll().filter(o => ['late', 'week'].includes(ordUrgency(o).k));
}

// ---------- הוספת הזמנה למשימה ----------
function ordAdd(taskId) {
  const t = bdFind(taskId);
  if (!t) return;
  t.orders = t.orders || [];
  const mat = ordGuessMaterial(t.name, t.parent);
  const need = t.start || t.bl_start;
  t.orders.push({
    material: mat, qty: '', supplier: '',
    lead: ORD_LEAD[mat] || 0,
    needDate: need,
    deadline: ordDeadline(need, ORD_LEAD[mat] || 0),
    status: 'טרם', orderNo: '', note: ''
  });
  ordRender(taskId);
}

function ordSet(taskId, i, field, val) {
  const t = bdFind(taskId), o = t.orders[i];
  if (!o) return;
  o[field] = (field === 'lead') ? (+val || 0) : val;
  if (field === 'material') o.lead = ORD_LEAD[val] != null ? ORD_LEAD[val] : o.lead;
  if (['material', 'lead', 'needDate'].includes(field))
    o.deadline = ordDeadline(o.needDate, o.lead);
  ordRender(taskId);
}

function ordDel(taskId, i) {
  const t = bdFind(taskId);
  t.orders.splice(i, 1);
  ordRender(taskId);
}

function ordSave(taskId) {
  const t = bdFind(taskId);
  t.orders = (t.orders || []).filter(o => o.material);
  if (typeof saveAll === 'function') saveAll();
  if (typeof scheduleCloudSave === 'function') scheduleCloudSave();
  closeModal();
  if (typeof renderSchedScreen === 'function') renderSchedScreen();
  if (typeof toast === 'function') toast('✓ הזמנות נשמרו');
}

// ---------- מסך הזמנות של משימה ----------
function ordRender(taskId) {
  const t = bdFind(taskId);
  const orders = t.orders || [];
  const rows = orders.length ? orders.map((o, i) => {
    const u = ordUrgency(o);
    return `
    <tr style="border-bottom:1px solid var(--bd)">
      <td style="padding:6px 4px">
        <select onchange="ordSet('${taskId}',${i},'material',this.value)"
                style="background:var(--bg2);border:1px solid var(--bd);border-radius:4px;color:var(--tx);font-size:12px;padding:3px">
          ${Object.keys(ORD_LEAD).map(m => `<option style="background:var(--sf);color:var(--tx)" ${o.material === m ? 'selected' : ''}>${m}</option>`).join('')}
        </select>
      </td>
      <td style="padding:6px 4px"><input value="${o.qty||''}" placeholder="כמות" onchange="ordSet('${taskId}',${i},'qty',this.value)"
          style="width:62px;background:var(--bg2);border:1px solid var(--bd);border-radius:4px;color:var(--tx);font-size:12px;padding:2px 5px"></td>
      <td style="padding:6px 4px"><input value="${o.supplier||''}" placeholder="ספק" onchange="ordSet('${taskId}',${i},'supplier',this.value)"
          style="width:88px;background:var(--bg2);border:1px solid var(--bd);border-radius:4px;color:var(--tx);font-size:12px;padding:2px 5px"></td>
      <td style="padding:6px 4px;text-align:center"><input type="number" min="0" value="${o.lead||0}" onchange="ordSet('${taskId}',${i},'lead',this.value)"
          style="width:46px;background:var(--bg2);border:1px solid var(--bd);border-radius:4px;color:var(--tx);font-size:12px;padding:2px;text-align:center"></td>
      <td style="padding:6px 4px;font-size:11px;color:var(--tx3);white-space:nowrap">${mspFmt(o.needDate)}</td>
      <td style="padding:6px 4px;white-space:nowrap"><strong style="color:${u.c};font-size:12px">${mspFmt(o.deadline)}</strong></td>
      <td style="padding:6px 4px;text-align:center"><span style="color:${u.c};font-size:11px;font-weight:600">${u.t}</span></td>
      <td style="padding:6px 4px">
        <select onchange="ordSet('${taskId}',${i},'status',this.value)"
                style="background:var(--bg2);border:1px solid var(--bd);border-radius:4px;color:var(--tx);font-size:12px;padding:3px">
          ${['טרם','הוזמן','סופק'].map(s => `<option style="background:var(--sf);color:var(--tx)" ${o.status === s ? 'selected' : ''}>${s}</option>`).join('')}
        </select>
      </td>
      <td style="padding:6px 2px;text-align:center">
        <button onclick="ordDel('${taskId}',${i})" style="background:none;border:none;color:var(--rd);cursor:pointer;font-size:15px">🗑</button>
      </td>
    </tr>`;
  }).join('') : `<tr><td colspan="9" style="padding:24px;text-align:center;color:var(--tx3)">אין הזמנות. לחץ "➕ הזמנה".</td></tr>`;

  document.getElementById('modal-root').innerHTML = `
  <div class="modal-overlay" onclick="if(this===event.target)closeModal()">
    <div class="modal" style="max-width:960px;max-height:92vh;overflow-y:auto">
      <div style="border-bottom:1px solid var(--bd);padding-bottom:10px;margin-bottom:12px">
        <div style="font-size:17px;font-weight:700">📦 הזמנות — ${t.name}</div>
        <div style="font-size:12px;color:var(--brand-gold);margin-top:2px">📍 ${t.parent || '—'} · נדרש ל-${mspFmt(t.start || t.bl_start)}</div>
      </div>
      <div style="background:var(--bg2);padding:8px 12px;border-radius:8px;margin-bottom:10px;font-size:12px;color:var(--tx3)">
        💡 דדליין = תאריך נדרש − זמן אספקה − ${ORD_SAFETY} ימי ביטחון (בימי עבודה)
      </div>
      <button class="btn btn-sm" onclick="ordAdd('${taskId}')" style="margin-bottom:10px">➕ הזמנה</button>
      <div style="overflow-x:auto;border:1px solid var(--bd);border-radius:8px">
        <table style="width:100%;border-collapse:collapse;font-size:13px">
          <thead style="background:var(--bg2)"><tr>
            <th style="padding:7px 4px;font-size:12px">חומר</th>
            <th style="padding:7px 4px;font-size:12px">כמות</th>
            <th style="padding:7px 4px;font-size:12px">ספק</th>
            <th style="padding:7px 4px;font-size:12px">אספקה</th>
            <th style="padding:7px 4px;font-size:12px">נדרש ל-</th>
            <th style="padding:7px 4px;font-size:12px">⏰ להזמין עד</th>
            <th style="padding:7px 4px;font-size:12px">מצב</th>
            <th style="padding:7px 4px;font-size:12px">סטטוס</th>
            <th style="padding:7px 2px"></th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      <div style="display:flex;gap:8px;margin-top:14px;justify-content:flex-end">
        <button class="btn" onclick="schedBreakdown('${taskId}')">← חזרה לפירוק</button>
        <button class="btn" style="background:var(--brand-gold);color:#fff;border-color:var(--brand-gold);font-weight:600"
                onclick="ordSave('${taskId}')">💾 שמור</button>
      </div>
    </div>
  </div>`;
}

// ---------- מסך ריכוז כל ההזמנות ----------
function ordCenter() { ordCenterFrom(ordAll()); }

function ordCenterFrom(src) {
  const all = (src || []).map(o => Object.assign({}, o, { _u: ordUrgency(o) }));
  const rank = { late: 0, week: 1, month: 2, ok: 3, ordered: 4, done: 5, none: 6 };
  all.sort((a, b) => (rank[a._u.k] - rank[b._u.k]) || (a.deadline || '').localeCompare(b.deadline || ''));
  const cnt = k => all.filter(o => o._u.k === k).length;

  const rows = all.length ? all.map(o => `
    <tr style="border-bottom:1px solid var(--bd);cursor:pointer" onclick="ordRender('${o._taskId}')">
      <td style="padding:7px 5px"><span style="color:${o._u.c};font-weight:600;font-size:12px">${o._u.t}</span></td>
      <td style="padding:7px 5px;font-weight:600;font-size:13px">${o.material}</td>
      <td style="padding:7px 5px;font-size:12px">${o.qty || '—'}</td>
      <td style="padding:7px 5px;font-size:12px">${o.supplier || '—'}</td>
      <td style="padding:7px 5px;white-space:nowrap"><strong style="color:${o._u.c};font-size:12px">${mspFmt(o.deadline)}</strong></td>
      <td style="padding:7px 5px;font-size:12px;color:var(--tx3)">${mspFmt(o.needDate)}</td>
      <td style="padding:7px 5px;font-size:12px">${o._taskName}<div style="font-size:11px;color:var(--brand-gold)">📍 ${o._parent || '—'}${o._proj?` · ${o._proj}`:''}</div></td>
      <td style="padding:7px 5px;font-size:12px">${o.status}</td>
    </tr>`).join('') :
    `<tr><td colspan="8" style="padding:34px;text-align:center;color:var(--tx3)">אין הזמנות רשומות.<br><span style="font-size:12px">הוסף הזמנות דרך 📅 לו"ז ← משימה ← 📦 הזמנות</span></td></tr>`;

  document.getElementById('modal-root').innerHTML = `
  <div class="modal-overlay" onclick="if(this===event.target)closeModal()">
    <div class="modal" style="max-width:1000px;max-height:92vh;overflow-y:auto">
      <div style="display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--bd);padding-bottom:10px;margin-bottom:12px">
        <div style="font-size:17px;font-weight:700">📦 ריכוז הזמנות · ארגון אתר</div>
        <button class="btn btn-sm" onclick="closeModal()">✕</button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px">
        ${[['🔴 באיחור', cnt('late'), 'var(--rd)'], ['🟠 השבוע', cnt('week'), '#E67E22'],
           ['📦 הוזמן', cnt('ordered'), 'var(--bl)'], ['✓ סופק', cnt('done'), 'var(--gr)']]
          .map(([l, v, c]) => `<div style="background:var(--bg2);padding:9px;border-radius:8px;text-align:center">
            <div style="font-size:20px;font-weight:700;color:${c}">${v}</div>
            <div style="font-size:11px;color:var(--tx3)">${l}</div></div>`).join('')}
      </div>
      <div style="overflow-x:auto;border:1px solid var(--bd);border-radius:8px">
        <table style="width:100%;border-collapse:collapse;font-size:13px">
          <thead style="background:var(--bg2)"><tr>
            <th style="padding:7px 5px;font-size:12px">מצב</th>
            <th style="padding:7px 5px;font-size:12px">חומר</th>
            <th style="padding:7px 5px;font-size:12px">כמות</th>
            <th style="padding:7px 5px;font-size:12px">ספק</th>
            <th style="padding:7px 5px;font-size:12px">⏰ להזמין עד</th>
            <th style="padding:7px 5px;font-size:12px">נדרש ל-</th>
            <th style="padding:7px 5px;text-align:right;font-size:12px">משימה</th>
            <th style="padding:7px 5px;font-size:12px">סטטוס</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      <div style="font-size:11px;color:var(--tx3);margin-top:8px">💡 לחיצה על שורה פותחת את ההזמנות של המשימה</div>
    </div>
  </div>`;
}

</script>
</body>
</html>
